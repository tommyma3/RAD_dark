include: config/model/ad_base.yaml

model: RAD

# AD backbone
tf_n_embd: 32
tf_n_layer: 4
tf_n_head: 4
tf_dropout: 0.1
tf_attn_dropout: 0.1
tf_n_inner: 128

# Data context (same semantics as AD):
# context transitions = n_transit - 1
n_transit: 80

# RAD sequence budget in token space.
# Full AD token length is 3 * (n_transit - 1) + 1.
# Setting this lower than full length forces compression during training.
rad_max_seq_length: 160

# Compression
n_compress_tokens: 24
compress_n_layers: 2
compress_n_heads: 4
max_gradient_rounds: 2
max_compressions: null

# training
lr: 0.01
train_batch_size: 512
test_batch_size: 2048
train_source_timesteps: 1000
train_timesteps: 50000
num_warmup_steps: 0

num_workers: 4
