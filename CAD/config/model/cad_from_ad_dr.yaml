# Config for CAD model initialized from pre-trained AD
# This experiment:
# 1. Loads a trained AD model
# 2. Adds compression transformer
# 3. Finetunes the combined model

include: config/model/ad_base.yaml

model: CompressedAD

# AD Transformer settings - MUST match the pre-trained AD model
# These match ad_dr.yaml settings
tf_n_embd: 32
tf_n_layer: 4
tf_n_head: 4
tf_dropout: 0.1
tf_attn_dropout: 0.1
tf_n_inner: 128
n_transit: 60  # Reduced from AD's 240 since we use compression now

# Compression Settings - newly added to the AD model
n_compress_tokens: 16
compress_n_layers: 3
compress_n_heads: 4

# Gradient control
max_gradient_rounds: 100

# Reconstruction regularization
use_recon_reg: True
recon_reg_weight: 0.5

# Reward-weighted reconstruction
use_reward_weighted_recon: True
reward_weight_multiplier: 5.0

# Curriculum settings (None = unlimited)
max_compressions: null

# Dataset settings
min_context_length: 20
max_context_length: 1000

# Training settings for finetuning
# Lower learning rate for finetuning pre-trained weights
lr: 0.0001
train_batch_size: 256
test_batch_size: 1024
train_source_timesteps: 1000
train_timesteps: 100000
num_warmup_steps: 2000

num_workers: 4
train_n_stream: 20

# Curriculum with stage-specific length distributions
# More gradual curriculum since we're finetuning
curriculum_schedule:
  - step: 0
    max_compressions: 1
    length_distribution:
      short: 0.60
      medium: 0.35
      long: 0.05
      very_long: 0.00
  - step: 15000
    max_compressions: 2
    length_distribution:
      short: 0.40
      medium: 0.40
      long: 0.15
      very_long: 0.05
  - step: 35000
    max_compressions: 3
    length_distribution:
      short: 0.30
      medium: 0.35
      long: 0.25
      very_long: 0.10
  - step: 60000
    max_compressions: null
    length_distribution:
      short: 0.20
      medium: 0.25
      long: 0.30
      very_long: 0.25
